<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 44" aria-label="Chorus AI Systems">
  <!-- Signal arcs centered at (4, 22), opening right — resonance / chorus -->
  <circle cx="4" cy="22" r="2.2" fill="#1ABC9C"/>
  <!-- r = 6 -->
  <path d="M 7 16.8 A 6 6 0 0 1 7 27.2"   fill="none" stroke="#1ABC9C" stroke-width="2.5" stroke-linecap="round"/>
  <!-- r = 11 -->
  <path d="M 9.5 12.5 A 11 11 0 0 1 9.5 31.5" fill="none" stroke="#1ABC9C" stroke-width="2"   stroke-linecap="round"/>
  <!-- r = 16 -->
  <path d="M 12 8.1 A 16 16 0 0 1 12 35.9"  fill="none" stroke="#1ABC9C" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Wordmark -->
  <text
    x="30" y="27"
    font-family="'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
    font-size="17"
    letter-spacing="0.5"
  ><tspan font-weight="700" fill="#E8EDF2">CHORUS AI</tspan><tspan font-weight="400" fill="#1ABC9C"> SYSTEMS</tspan></text>
</svg>
